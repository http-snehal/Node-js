<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb | Host Your Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/airbnb/static/output.css" />
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="bg-white border-b border-gray-200 p-4">
        <div class="container mx-auto flex items-center justify-between">
            <a href="/" class="flex items-center gap-1 text-[#FF385C]">
                <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="currentColor"><path d="M16 1c2.008 0 3.463.963 4.751 3.269l.533 1.025c1.954 3.83 6.114 12.54 7.1 14.836l.145.353c.667 1.591.91 2.472.96 3.396l.01.415.001.228c0 4.062-2.877 6.478-6.357 6.478-2.224 0-4.556-1.258-6.709-3.386l-.257-.26-.172-.179h-.011l-.176.185c-2.044 2.1-4.392 3.415-6.474 3.614l-.54.027c-3.415 0-6.292-2.416-6.292-6.478l.01-.285c.01-.433.102-1.139.63-2.502l.147-.367c.983-2.28 5.114-10.954 7.078-14.808l.543-1.042C12.551 1.963 14.004 1 16 1zm0 2c-1.232 0-2.203.626-3.23 2.46l-.506.97c-1.915 3.712-6.052 12.38-7.014 14.619l-.146.353c-.452 1.082-.544 1.666-.56 2.11l-.004.21c0 2.872 1.942 4.478 4.292 4.478 1.624 0 3.523-1.076 5.37-3.045l.21-.23.18-.198.188-.205 1.401 1.488c2.01 2.022 4.093 3.19 5.8 3.19 2.91 0 4.357-2.11 4.357-4.478l-.004-.21c-.013-.362-.081-.926-.484-2.002l-.146-.353c-.962-2.239-5.111-10.94-7.013-14.618l-.507-.97C18.214 3.626 17.241 3 16 3zm0 9a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"></path></svg>
                <span class="text-xl font-bold tracking-tight">airbnb</span>
            </a>
            <a href="/" class="text-sm font-semibold hover:underline">Exit</a>
        </div>
    </header>

    <main class="min-h-[calc(100-80px)] flex items-center justify-center p-6">
        <div class="w-full max-w-xl bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
            
            <div class="h-2 w-full bg-gray-100">
                <div class="h-full bg-[#FF385C] w-1/3"></div>
            </div>

            <div class="p-8 md:p-12">
                <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome to the Host Page</h1>
                <p class="text-gray-500 mb-10">It’s easy to get started on Airbnb. Tell us about your place.</p>

                <form action="/host/add-home" method="POST" class="space-y-6">
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Give your home a title</label>
                        <input type="text" name="homeName" placeholder="e.g. Modern Apartment with City View" required
                               class="w-full px-4 py-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#FF385C] focus:border-transparent transition outline-none text-lg">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Where is it located?</label>
                        <div class="relative">
                            <span class="absolute left-4 top-4 text-gray-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            </span>
                            <input type="text" name="location" placeholder="City, Country" required
                                   class="w-full pl-12 pr-4 py-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#FF385C] focus:border-transparent transition outline-none text-lg">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Set your price (per night)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-4 text-gray-500 font-bold text-lg">$</span>
                            <input type="number" name="price" placeholder="0" required
                                   class="w-full pl-10 pr-4 py-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#FF385C] focus:border-transparent transition outline-none text-lg">
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit" 
                                class="w-full bg-gradient-to-r from-[#FF385C] to-[#BD1E59] text-white py-4 rounded-xl font-bold text-xl hover:shadow-xl transform active:scale-[0.98] transition-all">
                            Submit Listing
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </main>

</body>
</html>
