<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb | Success!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/airbnb/static/output.css" />
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans antialiased">

    <main class="w-full max-w-md p-8 text-center bg-white rounded-3xl shadow-xl border border-gray-100 mx-4">
        
        <div class="mb-6 flex justify-center">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-green-600 animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Success!</h1>
        <p class="text-gray-500 mb-8">Your home has been added successfully and is now live for guests to discover.</p>

        <div class="space-y-3">
            <a href="/" 
               class="block w-full bg-[#FF385C] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#E00B41] transition-all shadow-md active:scale-95">
                Go to Home Page
            </a>
            
            <a href="/host/add-home" 
               class="block w-full bg-white text-gray-700 py-4 rounded-xl font-bold border border-gray-300 hover:bg-gray-50 transition-all">
                Add Another Home
            </a>
        </div>

        <p class="mt-8 text-xs text-gray-400 uppercase tracking-widest font-bold">
            Hosting on Airbnb
        </p>
    </main>

</body>
</html>
